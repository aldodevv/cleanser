name: Flutter CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🛠️ Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🔎 Analyze Source Code
        run: flutter analyze

      - name: 🏗️ Build DEV APK
        run: flutter build apk -t lib/main_dev.dart --release
        
      - name: 🏗️ Build UAT APK
        run: flutter build apk -t lib/main_uat.dart --release

      - name: 🏗️ Build PROD APK
        run: flutter build apk -t lib/main_prod.dart --release

      - name: 📤 Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cleanser-APKs
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🛠️ Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: 🏗️ Build DEV iOS (No Codesign)
        run: flutter build ios -t lib/main_dev.dart --release --no-codesign

      - name: 🏗️ Build UAT iOS (No Codesign)
        run: flutter build ios -t lib/main_uat.dart --release --no-codesign

      - name: 🏗️ Build PROD iOS (No Codesign)
        run: flutter build ios -t lib/main_prod.dart --release --no-codesign

      - name: 📤 Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Cleanser-iOS-Runner.app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

