targets:
  $default:
    builders:
      injectable_generator:injectable_builder:
        options:
          build_extensions:
            "^lib/{{dir}}/{{file}}.dart": "lib/{{dir}}/{{file}}.config.dart"
      freeze:
        options:
          build_extensions:
            "^lib/{{dir}}/{{file}}.dart": "lib/{{dir}}/{{file}}.freezed.dart"
      json_serializable:
        options:
          explicit_to_json: true
          field_rename: snake
          any_map: true
